<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RP Overlay</title>
  <link rel="stylesheet" href="../../css/in_game.css" />
</head>
<body>
  <div id="widget">

    <!-- Rank header (drag handle) -->
    <div id="rank-header">
      <span id="rank-emblem"></span>
      <span id="rank-name">APEX</span>
      <span id="ladder-pos"></span>
    </div>

    <!-- Two stat columns: current RP + session change -->
    <div id="stat-row">
      <div class="stat">
        <span class="stat-label">CURRENT RP</span>
        <span class="stat-val" id="current-rp">—</span>
      </div>
      <div class="stat" id="stat-change">
        <span class="stat-label">CHANGE</span>
        <span class="stat-val" id="session-delta">+0</span>
      </div>
    </div>

    <!-- Last 4 games -->
    <div id="games-block">
      <span class="section-label">LAST 4 GAMES</span>
      <div id="games-row">
        <span class="game-pill empty"></span>
        <span class="game-pill empty"></span>
        <span class="game-pill empty"></span>
        <span class="game-pill empty"></span>
      </div>
    </div>

    <!-- Next rank-up -->
    <div id="rankup-block">
      <div id="rankup-text">
        <span id="rankup-remaining">—</span>
        <span id="rankup-target">TO NEXT RANK</span>
      </div>
      <div id="rankup-bar"><div id="rankup-fill"></div></div>
    </div>

  </div>
  <script src="in_game.js"></script>
</body>
</html>
